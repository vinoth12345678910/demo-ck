

name: CI Pipeline

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches: [main]

# Define the jobs that this workflow will run
jobs:
  # ---- JOB: Build & Test ----
  # Runs on a fresh Ubuntu virtual machine
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Strategy matrix: we could add Node versions here
    # to test compatibility across versions
    strategy:
      matrix:
        node-version: [20]

    steps:
      # Step 1: Check out the repository code
      # This gives the workflow access to the files
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js with the version from our matrix
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Cache npm dependencies for faster subsequent runs
          cache: "npm"

      # Step 3: Install all dependencies
      # 'npm ci' is preferred over 'npm install' in CI
      # because it uses the lockfile exactly and fails
      # if there are mismatches (ensures reproducibility)
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint
      # Catches common issues like unused variables,
      # missing imports, and code style violations
      - name: Run linting
        run: npm run lint

      # Step 5: Build the Next.js application
      # Compiles TypeScript, bundles with Turbopack,
      # and generates the standalone output
      - name: Build application
        run: npm run build

      # Step 6: Build Docker image
      # Verifies the Dockerfile works and produces
      # a valid image without actually pushing it
      - name: Build Docker image
        run: docker build -t build-to-scale-demo .
